<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>
</head>
<body>

<h2>Voluntarios</h2>

<table border="1" id="tabla">
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Apellido</th>
<th>Correo</th>
<th>Telefono</th>
<th>Fecha</th>
</tr>
</table>

<script>

if(sessionStorage.getItem("admin")!="1"){
  location="/admin/login.html";
}

async function cargar(){

  const r=await fetch("/api/get-voluntarios");

  const data=await r.json();

  const t=document.getElementById("tabla");

  data.forEach(v=>{

    t.innerHTML+=`
    <tr>
    <td>${v.id}</td>
    <td>${v.nombre}</td>
    <td>${v.apellido}</td>
    <td>${v.correo}</td>
    <td>${v.telefono}</td>
    <td>${v.fecha}</td>
    </tr>
    `;

  });

}

cargar();

</script>

</body>
</html>
